### To generate the output file to incorporate in the README.md,
### Execute this command in the root folder:
# terraform-docs -c .terraform-docs.yml module

formatter: "markdown document" # this is required

version: "~> 0.18"

header-from: "../docs/_header.md"
footer-from: "../docs/_footer.md"

recursive:
  enabled: false
  path: module

sections:
  hide: []
  show: []

content: |-
  {{ .Header }}

  {{ .Requirements }}

  {{ .Modules }}

  {{ .Resources }}

  ## Example
  ```hcl
  {{ include "../example/main.tf" }}
  ```

  {{ .Inputs }}

  {{ .Outputs }}

  {{ .Footer }}

output:
  file: ../README.md
  mode: replace
  template: |-
    {{ .Content }}

output-values:
  enabled: false
  from: ""

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: false
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: false
  read-comments: true
  required: true
  sensitive: true
  type: true